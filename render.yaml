staticSites:
  - name: shadematch
    buildCommand: npm run build
    publishPath: dist
    rootDirectory: .
    pullRequestPreviewsEnabled: true
    environmentSlug: node
    envVars:
      - key: VITE_APP_NAME
        value: ShadeMatch
      - key: VITE_APP_TAGLINE
        value: AI-Powered Outfit Color Matcher
      - key: VITE_APP_DESCRIPTION
        value: Upload your clothing and get instant styling suggestions
      - key: VITE_APP_EMAIL
        value: hello@shadematch.app
      - key: VITE_APP_GITHUB
        value: https://github.com
      - key: VITE_FIREBASE_API_KEY
        sync: false
      - key: VITE_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: VITE_FIREBASE_PROJECT_ID
        sync: false
      - key: VITE_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: VITE_FIREBASE_APP_ID
        sync: false
      - key: VITE_FIREBASE_MEASUREMENT_ID
        sync: false
      - key: VITE_GEMINI_API_KEY
        sync: false
      - key: VITE_GEMINI_MODEL
        value: gemini-2.0-flash-lite
